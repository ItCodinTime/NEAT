name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  keras-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,keras]"
          pip install tensorflow
      - name: Keras integration tests
        run: pytest tests/integration/test_keras_optimizer.py -q
      - name: Keras example smoke test
        run: python examples/keras_manual_apply.py

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          rm -rf build dist
          python -m build
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/neat-wheel-smoke
          WHEEL="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"
          test -n "$WHEEL"
          /tmp/neat-wheel-smoke/bin/pip install "$WHEEL"
          /tmp/neat-wheel-smoke/bin/python scripts/smoke_install.py
