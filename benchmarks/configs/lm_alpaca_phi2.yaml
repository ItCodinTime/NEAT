# Phi-2 instruction fine-tuning on Alpaca (causal language model)
# LoRA adapter; 8-bit quantisation optional via bitsandbytes

task:
  task: alpaca
  model: microsoft/phi-2
  epochs: 1
  batch_size: 4
  gradient_accumulation: 8       # effective batch = 32
  max_length: 512
  max_train_samples: 10000
  max_eval_samples: 500
  lora: true
  seeds: [7]

neat:
  optimizer: neat
  lr: 5.0e-5
  weight_decay: 0.01
  alpha: 0.25
  beta: 0.9
  opponent_source: previous_gradient
  adaptive_alpha: true
  adaptive_preconditioning: true
  bias_correction: true

adamw:
  optimizer: adamw
  lr: 5.0e-5
  weight_decay: 0.01
