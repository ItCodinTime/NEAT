# CIFAR-100 ResNet-34 head-to-head preset

task:
  dataset: cifar100
  model: resnet34
  epochs: 200
  batch_size: 128
  weight_decay: 5.0e-4
  target_accuracy: 0.70
  seeds: [7, 11, 19]

neat:
  optimizer: neat
  lr: 1.0e-3
  alpha: 0.25
  beta: 0.9
  opponent_source: previous_gradient
  adaptive_alpha: true
  adaptive_preconditioning: true
  bias_correction: true

adamw:
  optimizer: adamw
  lr: 1.0e-3
